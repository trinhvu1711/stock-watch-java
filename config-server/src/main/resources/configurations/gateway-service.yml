spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9098/realms/st
#      client:
#        provider:
#          keycloak:
#            issuer-uri: http://localhost:9098/realms/stock-watch
#        registration:
#          api-client:
#            provider: keycloak
#            client-id: stock-watch-api
#            client-secret: 9sJAzYqZy6hUf2lIK1JrMaCYDNS7WEGF
#            scope: openid, profile, email, roles
#            redirect-uri: *
  cloud:
    gateway:
#      globalcors:
#        cors-configurations:
#          '[/**]': # Applies to all paths
#            allowedOrigins: "*"
#            allowedMethods: GET, POST, PUT, DELETE, OPTIONS
#            allowedHeaders: "*"
#            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: stock-service
          uri: lb:http://STOCK-SERVICE
          predicates:
            - Path=/api/v1/stocks/**
        - id: stock-price-service
          uri: lb:http://STOCK-SERVICE
          predicates:
            - Path=/api/v1/stock-price/**
        - id: payment-service
          uri: lb:http://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
        - id: order-service
          uri: lb:http://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
        - id: order-service-checkouts
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/checkouts/**
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/v1/customers/**
        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/carts/**
server:
  port: 8222
